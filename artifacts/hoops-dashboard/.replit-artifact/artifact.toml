kind = "web"
previewPath = "/"
title = "Basketball Analytics Dashboard"
version = "1.0.0"
id = "artifacts/hoops-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20124

[services.development]
run = "pnpm --filter @workspace/hoops-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hoops-dashboard", "run", "build" ]
publicDir = "artifacts/hoops-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20124"
BASE_PATH = "/"
